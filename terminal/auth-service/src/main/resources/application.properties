# Server (run on 8082 to avoid conflict with swap-engine on 8080)
server.port=8082

# Load local .env file
spring.config.import=optional:file:.env[.properties]

# MySQL — auth-service reads/writes the users table
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/waveterminal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# No Redis — idempotency cache belongs to swap-engine
# No Gemini key — AI audit belongs to risk-audit-worker
