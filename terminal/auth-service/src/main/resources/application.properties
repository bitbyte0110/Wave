# Server (run on 8082 to avoid conflict with swap-engine on 8080)
server.port=8082

# MySQL — auth-service reads/writes the users table
spring.datasource.url=jdbc:mysql://localhost:3307/waveterminal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=V2F2ZVRlcm1pbmFsU3VwZXJTZWNyZXRLZXkyMDI2Xw==
app.jwt.expiration-ms=86400000

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# No Redis — idempotency cache belongs to swap-engine
# No Gemini key — AI audit belongs to risk-audit-worker
