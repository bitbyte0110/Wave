# Server (run on 8083 — dedicated audit worker port)
server.port=8083

# Load local .env file for Gemini API key (only this service needs it)
spring.config.import=optional:file:.env[.properties]

# RabbitMQ — consumes swap.audit.queue, publishes to audit.done.queue
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Swap-engine internal endpoint base URL (for PATCH /internal/transactions/{id}/remark)
app.swap-engine.base-url=http://localhost:8080
app.swap-engine.internal-api-key=wave-internal-secret-2026

# Gemini AI Risk Audit Configuration (key injected from .env)
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.0-flash
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/${app.gemini.model}:generateContent

# No MySQL — risk-audit-worker never touches the database directly
# No Redis — idempotency cache belongs to swap-engine
# No JWT — no user-facing endpoints here
