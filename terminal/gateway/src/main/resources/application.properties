# Server Port (Edge Entry Point)
server.port=8080

# Load local or parent .env file
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# JWT Config (shared secret with Auth-Service for validation at edge)
app.jwt.secret=${JWT_SECRET:V2F2ZVRlcm1pbmFsU3VwZXJTZWNyZXRLZXkyMDI2X1NlY3VyZV9KV1RfVG9rZW5fS2V5XzI1NkJpdHM=}

# Spring Cloud Gateway Route Configurations
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=swap-engine-wallet
spring.cloud.gateway.routes[1].uri=${SWAP_ENGINE_URL:http://localhost:8084}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/wallet/**

spring.cloud.gateway.routes[2].id=swap-engine-internal
spring.cloud.gateway.routes[2].uri=${SWAP_ENGINE_URL:http://localhost:8084}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/internal/**

spring.cloud.gateway.routes[3].id=market-streaming
spring.cloud.gateway.routes[3].uri=${MARKET_STREAMING_URL:http://localhost:8081}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/market/**

spring.cloud.gateway.routes[4].id=market-streaming-ws
spring.cloud.gateway.routes[4].uri=${MARKET_STREAMING_WS_URL:http://localhost:8081}
spring.cloud.gateway.routes[4].predicates[0]=Path=/ws/**


# Global CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://127.0.0.1:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

