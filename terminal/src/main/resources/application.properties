# Server Port Configuration
server.port=8080

# Load local .env file 
spring.config.import=optional:file:.env[.properties]

# MySQL Ledger Database Setup (Targeting Docker Port 3307!)
spring.datasource.url=jdbc:mysql://localhost:3307/waveterminal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA ORM Lifecycle Policies
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# RabbitMQ Event Infrastructure Broker Configurations
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# JWT Authentication Configuration
app.jwt.secret=V2F2ZVRlcm1pbmFsU3VwZXJTZWNyZXRLZXkyMDI2Xw==
app.jwt.expiration-ms=86400000

# Redis Cache Configuration (Docker port 6379)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Idempotency key TTL — 24 hours in seconds
app.idempotency.ttl-seconds=86400

# Gemini AI Risk Audit Configuration
app.gemini.api-key=${GEMINI_API_KEY}
app.gemini.model=gemini-2.0-flash
app.gemini.api-url=https://generativelanguage.googleapis.com/v1beta/models/${app.gemini.model}:generateContent