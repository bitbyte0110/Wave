apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: wave-terminal
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: wave/auth-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - secretRef:
                name: mysql-secret      # MYSQL_USERNAME, MYSQL_PASSWORD
            - secretRef:
                name: jwt-secret        # JWT_SECRET
            - secretRef:
                name: rabbitmq-secret   # RABBITMQ_USERNAME, RABBITMQ_PASSWORD
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://wave-mysql:3306/waveterminal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
            - name: SPRING_RABBITMQ_HOST
              value: "wave-rabbitmq"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: wave-terminal
spec:
  selector:
    app: auth-service
  ports:
    - port: 8082
      targetPort: 8082
