apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: wave-terminal
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: wave/gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: jwt-secret        # JWT_SECRET
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8082"
            - name: SWAP_ENGINE_URL
              value: "http://swap-engine:8084"
            - name: MARKET_STREAMING_URL
              value: "http://market-streaming:8083"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: wave-terminal
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
