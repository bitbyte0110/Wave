# Server (runs on 8084 behind Spring Cloud Gateway on 8080)
server.port=8084

# Load local .env file
spring.config.import=optional:file:.env[.properties]

# MySQL Ledger Database (Docker port 3307)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/waveterminal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Internal API key for Risk-Audit-Worker communication
app.swap-engine.internal-api-key=${INTERNAL_API_KEY}

# Redis (idempotency cache)
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Idempotency TTL (24 hours)
app.idempotency.ttl-seconds=86400
