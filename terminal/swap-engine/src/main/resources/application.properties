# Server
server.port=8080

# Load local .env file (not present in swap-engine — Gemini key lives in risk-audit-worker only)
# spring.config.import=optional:file:.env[.properties]

# MySQL Ledger Database (Docker port 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/waveterminal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# JWT
app.jwt.secret=V2F2ZVRlcm1pbmFsU3VwZXJTZWNyZXRLZXkyMDI2Xw==
app.jwt.expiration-ms=86400000

# Redis (idempotency cache)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Idempotency TTL (24 hours)
app.idempotency.ttl-seconds=86400
